<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabTrack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {

            background-image: url(mainpic.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }


        h1 {
            font-size: 7rem;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 1rem;
            -webkit-text-stroke: 1.5px rgb(188, 180, 180);
            background: linear-gradient(to right, #e53935, #00796b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;

        }

        h4 {
            font-size: 1.2rem;
            font-weight: normal;
            letter-spacing: 2px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.7);
            margin-bottom: 3rem;
            max-width: 80%;
            line-height: 1.5;



        }

        button {
            padding: 1rem 2.5rem;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        button:hover {
            box-shadow: inset 5em 0 0 0 #dd7e2a, inset linear-gradient(to right, #e53935, #00796b);
            border-color: #4e4d4d;
            color: #fff;
            background: linear-gradient(to right, #e53935, #00796b);

        }

        button a {
            text-decoration: none;
            color: inherit;
        }

        @media screen and (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
                text-align: center;
            }
        }



        @media screen and (max-width: 1200px) {
            h1 {
                font-size: 3rem;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <h1>LABTRACK</h1>
    <h4>School Laboratory Equipment Monitoring System and Management System</h4>

    <button><a href="loginpage.php">Start</a></button>

</body>

</html>
